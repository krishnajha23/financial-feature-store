// proto/feature_store.proto
// gRPC service definition for the Raft-backed feature store.
//
// Compile:
//   protoc -I proto --go_out=. --go-grpc_out=. proto/feature_store.proto
//   python -m grpc_tools.protoc -I proto --python_out=. --grpc_python_out=. proto/feature_store.proto

syntax = "proto3";
package feature_store;
option go_package = "github.com/yourusername/graph-feature-store/proto";

// ------------------------------------------------------------------
// Feature Store service (external API)
// ------------------------------------------------------------------

service FeatureStore {
    rpc SetFeature       (SetFeatureRequest)  returns (SetFeatureResponse);
    rpc GetFeature       (GetFeatureRequest)  returns (GetFeatureResponse);
    rpc BatchGetFeatures (BatchGetRequest)    returns (BatchGetResponse);
    rpc GetClusterStats  (StatsRequest)       returns (ClusterStats);

    // Raft internal RPCs (between nodes, mTLS only)
    rpc AppendEntries    (AppendEntriesRequest)  returns (AppendEntriesResponse);
    rpc RequestVote      (RequestVoteRequest)    returns (RequestVoteResponse);
    rpc InstallSnapshot  (SnapshotRequest)       returns (SnapshotResponse);
}

// ------------------------------------------------------------------
// Feature store messages
// ------------------------------------------------------------------

message SetFeatureRequest {
    string         namespace     = 1;  // "company_embeddings" | "executive_embeddings"
    string         entity_id     = 2;  // CIK or executive name
    repeated float embedding     = 3;  // 64-dimensional L2-normalized GNN embedding
    int64          model_version = 4;  // GNN training iteration (for staleness checks)
    int64          updated_at_ms = 5;  // unix milliseconds
}

message SetFeatureResponse {
    bool   success      = 1;
    string committed_at = 2;  // RFC3339 timestamp when Raft committed the write
}

message GetFeatureRequest {
    string namespace   = 1;
    string entity_id   = 2;
    bool   strong_read = 3;  // true=leader read (linearizable), false=local (eventual)
}

message GetFeatureResponse {
    repeated float embedding      = 1;
    int64          model_version  = 2;
    int64          updated_at_ms  = 3;
    bool           is_stale       = 4;  // true if older than staleness_threshold (5 min)
    string         served_by      = 5;  // node_id that served this read
}

message BatchGetRequest {
    string          namespace   = 1;
    repeated string entity_ids  = 2;
    bool            strong_read = 3;
}

message BatchGetResponse {
    map<string, GetFeatureResponse> features   = 1;
    int64                           latency_ms = 2;
}

message StatsRequest {}

message ClusterStats {
    string node_id        = 1;
    string role           = 2;  // "leader" | "follower" | "candidate"
    int64  term           = 3;
    int64  commit_index   = 4;
    int64  total_features = 5;
    double writes_per_sec = 6;
    double reads_per_sec  = 7;
}

// ------------------------------------------------------------------
// Raft internal messages
// ------------------------------------------------------------------

message LogEntry {
    int64  term  = 1;
    int64  index = 2;
    string key   = 3;
    string value = 4;
}

message AppendEntriesRequest {
    int64           term         = 1;   // leader's current term
    string          leader_id    = 2;   // used by followers to redirect clients
    int64           prev_log_idx = 3;   // index of log entry immediately before new ones
    int64           prev_log_term= 4;   // term of prev_log_idx entry
    repeated LogEntry entries    = 5;   // empty for heartbeat
    int64           leader_commit= 6;   // leader's commit index
}

message AppendEntriesResponse {
    bool  success = 1;
    int64 term    = 2;  // current term for leader to update itself
}

message RequestVoteRequest {
    int64  term          = 1;
    string candidate_id  = 2;
    int64  last_log_idx  = 3;  // used to enforce log completeness
    int64  last_log_term = 4;
}

message RequestVoteResponse {
    bool  vote_granted = 1;
    int64 term         = 2;
}

message SnapshotRequest {
    int64             term          = 1;
    string            leader_id     = 2;
    int64             last_included_index = 3;
    int64             last_included_term  = 4;
    map<string,string> state_machine     = 5;
}

message SnapshotResponse {
    int64 term = 1;
}
