version: "3.9"

# 5-node Raft cluster + supporting infrastructure
# Run: docker-compose up -d
# Cluster status: curl localhost:8080/cluster/status | jq

services:

  # ------------------------------------------------------------------
  # Infrastructure
  # ------------------------------------------------------------------

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: edgar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.10.0
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -v red"]
      interval: 10s
      timeout: 10s
      retries: 15

  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:10.1.0
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
    depends_on: [prometheus]

  # ------------------------------------------------------------------
  # Raft cluster: 5 nodes
  # ------------------------------------------------------------------

  node0:
    build: .
    command: >
      /app/feature-store
        -node-id=node0
        -peers=node1:50051,node2:50051,node3:50051,node4:50051
        -grpc-port=50051
        -http-port=8080
        -data-dir=/data
        -cert=/certs/node0.crt
        -key=/certs/node0.key
        -ca=/certs/ca.crt
        -kafka=kafka:29092
        -db=postgresql://postgres:postgres@postgres/edgar
    ports:
      - "50051:50051"
      - "8080:8080"
    volumes:
      - node0_data:/data
      - ./certs:/certs:ro
    depends_on:
      postgres:  {condition: service_healthy}
      kafka:     {condition: service_healthy}
      opensearch:{condition: service_healthy}
    environment:
      FIREBASE_PROJECT_ID: your-firebase-project

  node1:
    build: .
    command: >
      /app/feature-store
        -node-id=node1
        -peers=node0:50051,node2:50051,node3:50051,node4:50051
        -grpc-port=50051
        -http-port=8081
        -data-dir=/data
        -cert=/certs/node1.crt
        -key=/certs/node1.key
        -ca=/certs/ca.crt
        -kafka=kafka:29092
    ports:
      - "50052:50051"
      - "8081:8081"
    volumes:
      - node1_data:/data
      - ./certs:/certs:ro
    depends_on: [node0]

  node2:
    build: .
    command: >
      /app/feature-store
        -node-id=node2
        -peers=node0:50051,node1:50051,node3:50051,node4:50051
        -grpc-port=50051
        -http-port=8082
        -data-dir=/data
        -cert=/certs/node2.crt
        -key=/certs/node2.key
        -ca=/certs/ca.crt
        -kafka=kafka:29092
    ports:
      - "50053:50051"
      - "8082:8082"
    volumes:
      - node2_data:/data
      - ./certs:/certs:ro
    depends_on: [node0]

  node3:
    build: .
    command: >
      /app/feature-store
        -node-id=node3
        -peers=node0:50051,node1:50051,node2:50051,node4:50051
        -grpc-port=50051
        -http-port=8083
        -data-dir=/data
        -cert=/certs/node3.crt
        -key=/certs/node3.key
        -ca=/certs/ca.crt
        -kafka=kafka:29092
    ports:
      - "50054:50051"
      - "8083:8083"
    volumes:
      - node3_data:/data
      - ./certs:/certs:ro
    depends_on: [node0]

  node4:
    build: .
    command: >
      /app/feature-store
        -node-id=node4
        -peers=node0:50051,node1:50051,node2:50051,node3:50051
        -grpc-port=50051
        -http-port=8084
        -data-dir=/data
        -cert=/certs/node4.crt
        -key=/certs/node4.key
        -ca=/certs/ca.crt
        -kafka=kafka:29092
    ports:
      - "50055:50051"
      - "8084:8084"
    volumes:
      - node4_data:/data
      - ./certs:/certs:ro
    depends_on: [node0]

volumes:
  postgres_data:
  opensearch_data:
  node0_data:
  node1_data:
  node2_data:
  node3_data:
  node4_data:
